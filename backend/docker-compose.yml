services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      BILLING_DATABASE_URL: postgresql+asyncpg://billing_user:billing_pass@billing_db:5432/billing_db
      TEACHING_DATABASE_URL: postgresql+asyncpg://teaching_user:teaching_pass@teaching_db:5432/teaching_db
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      COOKIE_SECURE: "false"
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000,http://127.0.0.1:5173,http://127.0.0.1:3000
    depends_on:
      billing_db:
        condition: service_healthy
      teaching_db:
        condition: service_healthy

  billing_db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: billing_user
      POSTGRES_PASSWORD: billing_pass
      POSTGRES_DB: billing_db
    ports:
      - "5433:5432"
    volumes:
      - billing_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U billing_user -d billing_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  teaching_db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: teaching_user
      POSTGRES_PASSWORD: teaching_pass
      POSTGRES_DB: teaching_db
    ports:
      - "5434:5432"
    volumes:
      - teaching_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teaching_user -d teaching_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  billing_pgdata:
  teaching_pgdata:

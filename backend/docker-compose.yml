services:
  backend:
    build: .
    ports:
      - "8001:8000" # host:container — avoids clash with another app on 8000
    env_file:
      - .env.docker.defaults
      - .env.local
    # .env.docker.defaults is in repo (safe defaults). Create .env.local on the server with production secrets (Supabase URLs, JWT, CORS, Razorpay). If .env.local is missing, copy .env.docker.defaults to .env.local for in-container DB only.
    depends_on:
      billing_db:
        condition: service_healthy
      teaching_db:
        condition: service_healthy

  billing_db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: billing_user
      POSTGRES_PASSWORD: billing_pass
      POSTGRES_DB: billing_db
    ports:
      - "5433:5432"
    volumes:
      - billing_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U billing_user -d billing_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  teaching_db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: teaching_user
      POSTGRES_PASSWORD: teaching_pass
      POSTGRES_DB: teaching_db
    ports:
      - "5434:5432"
    volumes:
      - teaching_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teaching_user -d teaching_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  billing_pgdata:
  teaching_pgdata:

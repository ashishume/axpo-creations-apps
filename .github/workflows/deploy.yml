# Deploy Axpo Apps backend on your AWS instance via SSH (Docker Compose on the server).
#
# Repository secrets (Settings → Secrets and variables → Actions):
#   SSH_HOST         — EC2 public IP or DNS
#   SSH_USER         — e.g. ubuntu, ec2-user
#   SSH_PRIVATE_KEY  — Full PEM private key (matches authorized_keys on server)
#   DEPLOY_PATH      — Absolute path to repo root on server
#   SSH_PORT         — Optional; defaults to 22 if unset or empty
#
name: Axpo Apps Deployment - Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: SSH → pull → Docker Compose
    runs-on: ubuntu-latest
    steps:
      - name: Deploy on AWS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script_stop: true
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            git fetch origin main
            git checkout main
            git pull --ff-only origin main
            cd backend
            chmod +x deploy.sh
            ./deploy.sh

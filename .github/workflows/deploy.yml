# Auto-deploy backend with Docker Compose (detached)
# Runs backend/deploy.sh: build images and docker compose up -d
#
# For deploying to a persistent server, use a self-hosted runner on that server
# (add label e.g. self-hosted, then set runs-on: [self-hosted, linux, x64])
name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Build and run backend (Docker Compose)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Make deploy.sh executable
        run: chmod +x deploy.sh

      - name: Deploy backend (Docker Compose up -d)
        run: ./deploy.sh

# Deploy backend on your AWS instance via SSH (Docker Compose on the server).
#
# Required GitHub repo secrets (Settings → Secrets and variables → Actions):
#   DEPLOY_HOST     — EC2 public IP or DNS (e.g. 3.89.x.x or ec2-xx.compute.amazonaws.com)
#   DEPLOY_USER     — SSH user (often ubuntu, ec2-user, or admin)
#   DEPLOY_SSH_KEY  — Full private key (PEM) that matches the public key in ~/.ssh/authorized_keys on the server
#   DEPLOY_PATH     — Absolute path to this repo root on the server (e.g. /home/ubuntu/axpo-creations-apps)
#
# On the server (one-time): Docker + Docker Compose v2, clone repo, configure backend/.env,
# and ensure `git pull` works (deploy key or HTTPS access to the repo).
#
name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: SSH → pull → Docker Compose
    runs-on: ubuntu-latest
    steps:
      - name: Deploy on AWS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            git fetch origin main
            git checkout main
            git pull --ff-only origin main
            cd backend
            chmod +x deploy.sh
            ./deploy.sh
